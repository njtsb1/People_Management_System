<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>People Manager</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="theme-dark">
  <header class="topbar" role="banner">
    <div class="brand">
      <h1 id="app-title">Registration</h1>
      <p id="app-subtitle">Connect with former classmates, coworkers, and colleagues.</p>
    </div>

    <div class="controls" role="navigation" aria-label="Global controls">
      <label class="sr-only" for="lang-select">Language</label>
      <select id="lang-select" aria-label="Language selector">
        <option value="en">English (EN)</option>
        <option value="pt-BR">Português (PT-BR)</option>
        <option value="es">Español (ES)</option>
      </select>

      <button id="theme-toggle" aria-pressed="true" aria-label="Toggle theme">
        <span id="theme-icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" focusable="false" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/>
          </svg>
        </span>
        <span class="sr-only">Toggle theme</span>
      </button>
    </div>
  </header>

  <main class="container" role="main">
    <section class="panel profile" aria-labelledby="profile-heading">
      <h2 id="profile-heading">Profile</h2>
      <div class="profile-card" aria-hidden="false">
        <div class="avatar" id="profile-avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="80" height="80" fill="currentColor" focusable="false">
            <path d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-5 0-9 2.5-9 5v1h18v-1c0-2.5-4-5-9-5z"/>
          </svg>
        </div>
        <div class="profile-info">
          <p class="name" id="profile-name">Name</p>
          <p class="org" id="profile-org">Organization</p>
        </div>
        <nav class="profile-actions" aria-label="Profile actions">
          <button class="btn small" id="edit-profile">Edit profile</button>
          <button class="btn small" id="invite-friends">Invite friends</button>
        </nav>
      </div>
    </section>

    <section class="panel main" aria-labelledby="main-heading">
      <h2 id="main-heading">People</h2>

      <form id="person-form" class="form" aria-labelledby="form-heading">
        <h3 id="form-heading">Register a person</h3>

        <div class="form-row">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required aria-required="true" />
        </div>

        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required aria-required="true" />
        </div>

        <div class="form-row">
          <label for="organization">Organization</label>
          <input id="organization" name="organization" type="text" />
        </div>

        <div class="form-row">
          <label for="year" id="label-year">Year</label>
          <input id="year" name="year" type="number" min="1900" max="2100" inputmode="numeric" />
        </div>

        <div class="form-row actions">
          <button type="submit" class="btn primary" id="save-btn">Add</button>
          <button type="button" class="btn" id="reset-btn">Reset</button>
        </div>
      </form>

      <div class="toolbar">
        <label for="search" class="sr-only">Search people</label>
        <input id="search" type="search" placeholder="Search by name, year or organization" aria-label="Search people" />
        <div class="sort-filter">
          <label for="sort">Sort</label>
          <select id="sort" aria-label="Sort people">
            <option value="name">Name</option>
            <option value="year">Year</option>
            <option value="organization">Organization</option>
          </select>
        </div>
      </div>

      <section class="list" aria-labelledby="list-heading">
        <h3 id="list-heading">Participants</h3>
        <ul id="people-list" class="people-list" role="list" aria-live="polite"></ul>
      </section>
    </section>

    <aside class="panel sidebar" aria-labelledby="sidebar-heading">
      <h2 id="sidebar-heading">My Friends</h2>
      <div id="friends" class="box">
        <p class="muted">No friends yet</p>
      </div>

      <h2>Communities</h2>
      <div id="communities" class="box">
        <p class="muted">No communities yet</p>
      </div>
    </aside>
  </main>

  <footer class="footer" role="contentinfo">
    <p id="footer-text">© <span id="year"></span> People Manager</p>
  </footer>

  <template id="person-item-template">
    <li class="person-item" role="listitem" tabindex="0">
      <div class="person-left">
        <div class="thumb" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor" focusable="false">
            <path d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-5 0-9 2.5-9 5v1h18v-1c0-2.5-4-5-9-5z"/>
          </svg>
        </div>
        <div class="meta">
          <div class="pname"></div>
          <div class="pemail"></div>
          <div class="porg"></div>
          <div class="pyear"></div>
        </div>
      </div>
      <div class="person-actions">
        <button class="btn small add-friend">+ friend</button>
        <button class="btn small edit">Edit</button>
        <button class="btn small danger delete">Delete</button>
      </div>
    </li>
  </template>

  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="./script.js" defer></script>
</body>
</html>
